  <!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<title>HOLOGRAM AI</title>

<style>
body {
  margin: 0;
  background: black;
  color: cyan;
  font-family: monospace;
  text-align: center;
}

h1 {
  margin-top: 30px;
  text-shadow: 0 0 20px cyan;
}

.panel {
  margin: 40px auto;
  width: 320px;
  padding: 20px;
  border: 2px solid cyan;
  box-shadow: 0 0 20px cyan;
}

button {
  width: 100%;
  margin: 10px 0;
  padding: 15px;
  background: black;
  border: 2px solid cyan;
  color: cyan;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: cyan;
  color: black;
}

.status {
  margin-top: 20px;
  color: lime;
}

.glow {
  text-shadow: 0 0 10px cyan;
}
</style>
</head>

<body>

<h1>HOLOGRAM AI SYSTEM</h1>

<div class="panel">

<button onclick="startVoice()">🎤 Start Voice Control</button>
<button onclick="speak('System online')">🔊 Test Voice</button>

<div class="status glow" id="status">STANDBY</div>

</div>

<script>

// 🔊 TEXT TO SPEECH
function speak(text){
  let msg = new SpeechSynthesisUtterance(text);
  msg.lang = "en-US";
  msg.rate = 1;
  window.speechSynthesis.speak(msg);

  document.getElementById("status").innerText = text;
}

// 🎤 VOICE RECOGNITION
function startVoice(){

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();

  recognition.lang = "en-US";
  recognition.continuous = true;

  recognition.start();

  speak("Voice control activated");

  recognition.onresult = function(event){
    let command = event.results[event.results.length - 1][0].transcript.toLowerCase();

    document.getElementById("status").innerText = "YOU: " + command;

    // 🔥 COMMANDS
    if(command.includes("activate")){
      speak("Hologram activated");
    }

    else if(command.includes("deactivate")){
      speak("Hologram deactivated");
    }

    else if(command.includes("scan")){
      speak("Scanning area");
    }

    else if(command.includes("hello")){
      speak("Hello user");
    }

    else {
      speak("Command not recognized");
    }
  };
}

</script>

</body>
</html>
